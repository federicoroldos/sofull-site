name: Android Release Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-release-artifacts:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set temporary Android paths
        shell: bash
        run: echo "ANDROID_KEYSTORE_PATH=$RUNNER_TEMP/ci-keystore.jks" >> "$GITHUB_ENV"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        shell: bash
        run: |
          set -euo pipefail

          sdk_roots=(
            "${ANDROID_SDK_ROOT:-}"
            "${ANDROID_HOME:-}"
            "/usr/local/lib/android/sdk"
            "$HOME/android-sdk"
          )

          android_sdk_dir=""
          for candidate in "${sdk_roots[@]}"; do
            if [ -n "$candidate" ] && [ -d "$candidate" ]; then
              android_sdk_dir="$candidate"
              break
            fi
          done

          if [ -z "$android_sdk_dir" ]; then
            echo "Unable to locate Android SDK on runner."
            exit 1
          fi

          sdkmanager_bin="$android_sdk_dir/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$sdkmanager_bin" ] && [ -x "$android_sdk_dir/cmdline-tools/bin/sdkmanager" ]; then
            sdkmanager_bin="$android_sdk_dir/cmdline-tools/bin/sdkmanager"
          fi

          if [ ! -x "$sdkmanager_bin" ] && command -v sdkmanager >/dev/null 2>&1; then
            sdkmanager_bin="$(command -v sdkmanager)"
          fi

          if [ ! -x "$sdkmanager_bin" ]; then
            echo "sdkmanager is not available on this runner."
            exit 1
          fi

          {
            echo "ANDROID_SDK_ROOT=$android_sdk_dir"
            echo "ANDROID_HOME=$android_sdk_dir"
          } >> "$GITHUB_ENV"

          set +o pipefail
          yes | "$sdkmanager_bin" --sdk_root="$android_sdk_dir" --licenses >/dev/null
          set -o pipefail
          "$sdkmanager_bin" --sdk_root="$android_sdk_dir" --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Validate required CI secrets
        run: |
          required=(
            ANDROID_KEYSTORE_BASE64
            ANDROID_KEYSTORE_PASSWORD
            ANDROID_KEY_ALIAS
            ANDROID_KEY_PASSWORD
            VITE_FIREBASE_API_KEY
            VITE_FIREBASE_AUTH_DOMAIN
            VITE_FIREBASE_PROJECT_ID
            VITE_FIREBASE_APP_ID
            VITE_AUTH_EMAIL_ENDPOINT
            VITE_GOOGLE_WEB_CLIENT_ID
          )
          for key in "${required[@]}"; do
            if [ -z "${!key}" ]; then
              echo "Missing required secret: $key"
              exit 1
            fi
          done
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_AUTH_EMAIL_ENDPOINT: ${{ secrets.VITE_AUTH_EMAIL_ENDPOINT }}
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.VITE_GOOGLE_WEB_CLIENT_ID }}

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$ANDROID_KEYSTORE_PATH"

      - name: Show signing certificate fingerprints
        shell: bash
        run: |
          set -euo pipefail
          keytool -list -v \
            -alias "$ANDROID_KEY_ALIAS" \
            -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -keypass "$ANDROID_KEY_PASSWORD" | awk '/Alias name:|SHA1:|SHA256:/{print}'

      - name: Set Android version metadata
        shell: bash
        run: |
          set -euo pipefail

          version_code="${GITHUB_RUN_NUMBER}"
          version_name="1.0.${GITHUB_RUN_NUMBER}"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            version_name="${GITHUB_REF_NAME#v}"
          fi

          {
            echo "ANDROID_VERSION_CODE=$version_code"
            echo "ANDROID_VERSION_NAME=$version_name"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Build web + sync Android
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_AUTH_EMAIL_ENDPOINT: ${{ secrets.VITE_AUTH_EMAIL_ENDPOINT }}
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.VITE_GOOGLE_WEB_CLIENT_ID }}
        run: npm run android:build

      - name: Build release AAB and APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew bundleRelease assembleRelease

      - name: Verify release APK signing certificate
        shell: bash
        run: |
          set -euo pipefail

          apksigner_bin="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}/build-tools/36.0.0/apksigner"
          if [ ! -x "$apksigner_bin" ] && command -v apksigner >/dev/null 2>&1; then
            apksigner_bin="$(command -v apksigner)"
          fi

          if [ ! -x "$apksigner_bin" ]; then
            echo "apksigner not found."
            exit 1
          fi

          "$apksigner_bin" verify --print-certs android/app/build/outputs/apk/release/app-release.apk

      - name: Generate checksums
        run: |
          sha256sum android/app/build/outputs/bundle/release/app-release.aab > android/app/build/outputs/bundle/release/app-release.aab.sha256
          sha256sum android/app/build/outputs/apk/release/app-release.apk > android/app/build/outputs/apk/release/app-release.apk.sha256

      - name: Upload release AAB
        uses: actions/upload-artifact@v7
        with:
          name: sofull-release-aab
          path: |
            android/app/build/outputs/bundle/release/app-release.aab
            android/app/build/outputs/bundle/release/app-release.aab.sha256

      - name: Upload release APK
        uses: actions/upload-artifact@v7
        with:
          name: sofull-release-apk
          path: |
            android/app/build/outputs/apk/release/app-release.apk
            android/app/build/outputs/apk/release/app-release.apk.sha256

      - name: Clean up Android keystore
        if: always()
        shell: bash
        run: rm -f "$ANDROID_KEYSTORE_PATH"
