name: Android Debug APK

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      ANDROID_KEYSTORE_PATH: ci-keystore.jks
      ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        shell: bash
        run: |
          set -euo pipefail

          sdk_roots=(
            "${ANDROID_SDK_ROOT:-}"
            "${ANDROID_HOME:-}"
            "/usr/local/lib/android/sdk"
            "$HOME/android-sdk"
          )

          android_sdk_dir=""
          for candidate in "${sdk_roots[@]}"; do
            if [ -n "$candidate" ] && [ -d "$candidate" ]; then
              android_sdk_dir="$candidate"
              break
            fi
          done

          if [ -z "$android_sdk_dir" ]; then
            echo "Unable to locate Android SDK on runner."
            exit 1
          fi

          sdkmanager_bin="$android_sdk_dir/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$sdkmanager_bin" ] && [ -x "$android_sdk_dir/cmdline-tools/bin/sdkmanager" ]; then
            sdkmanager_bin="$android_sdk_dir/cmdline-tools/bin/sdkmanager"
          fi

          if [ ! -x "$sdkmanager_bin" ] && command -v sdkmanager >/dev/null 2>&1; then
            sdkmanager_bin="$(command -v sdkmanager)"
          fi

          if [ ! -x "$sdkmanager_bin" ]; then
            echo "sdkmanager is not available on this runner."
            exit 1
          fi

          {
            echo "ANDROID_SDK_ROOT=$android_sdk_dir"
            echo "ANDROID_HOME=$android_sdk_dir"
          } >> "$GITHUB_ENV"

          yes | "$sdkmanager_bin" --sdk_root="$android_sdk_dir" --licenses >/dev/null
          "$sdkmanager_bin" --sdk_root="$android_sdk_dir" --install \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      - name: Decode Android keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Missing ANDROID_KEYSTORE_BASE64 secret."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/ci-keystore.jks

      - name: Set Android version metadata
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "ANDROID_VERSION_CODE=$GITHUB_RUN_NUMBER"
            echo "ANDROID_VERSION_NAME=debug-$GITHUB_RUN_NUMBER"
          } >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Build web + sync Android
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_AUTH_EMAIL_ENDPOINT: ${{ secrets.VITE_AUTH_EMAIL_ENDPOINT }}
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.VITE_GOOGLE_WEB_CLIENT_ID }}
        run: npm run android:build

      - name: Assemble debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: sofull-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
