name: Android Internal Release

on:
  workflow_dispatch:
    inputs:
      google_play_track:
        description: Google Play track
        required: false
        default: internal
      android_version_name:
        description: Optional Android versionName override
        required: false
        default: ""
      android_version_code:
        description: Optional Android versionCode override
        required: false
        default: ""

permissions:
  contents: read

jobs:
  release-internal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Decode Android keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$RUNNER_TEMP/sofull-release.jks"

      - name: Install dependencies
        run: npm ci

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Publish Android AAB to Google Play internal testing
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/sofull-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          GOOGLE_PLAY_TRACK: ${{ inputs.google_play_track }}
          ANDROID_VERSION_NAME: ${{ inputs.android_version_name }}
          ANDROID_VERSION_CODE: ${{ inputs.android_version_code }}
          VITE_AUTH_EMAIL_ENDPOINT: ${{ secrets.VITE_AUTH_EMAIL_ENDPOINT }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_GOOGLE_WEB_CLIENT_ID: ${{ secrets.VITE_GOOGLE_WEB_CLIENT_ID }}
        run: npm run android:release:internal
