apply plugin: 'com.android.application'
apply plugin: 'com.github.triplet.play'

import com.github.triplet.gradle.androidpublisher.ReleaseStatus
import java.util.Locale

def androidVersionCodeValue = System.getenv("ANDROID_VERSION_CODE") ?: "2"
def androidVersionCodeNumber
try {
    androidVersionCodeNumber = androidVersionCodeValue.toInteger()
} catch (NumberFormatException ignored) {
    androidVersionCodeNumber = 2
}

def androidVersionNameValue = System.getenv("ANDROID_VERSION_NAME") ?: "1.0.1"
def googlePlayTrackValue = System.getenv("GOOGLE_PLAY_TRACK") ?: "internal"
def googlePlayCredentialsPath = System.getenv("GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_PATH")
def googlePlayReleaseStatusValue =
        (System.getenv("GOOGLE_PLAY_RELEASE_STATUS") ?: "draft").toUpperCase(Locale.ROOT)
def googlePlayReleaseStatus

try {
    googlePlayReleaseStatus = ReleaseStatus.valueOf(googlePlayReleaseStatusValue)
} catch (IllegalArgumentException ignored) {
    googlePlayReleaseStatus = ReleaseStatus.DRAFT
}

def hasCiSigning = System.getenv("ANDROID_KEYSTORE_PASSWORD") &&
        System.getenv("ANDROID_KEY_ALIAS") &&
        System.getenv("ANDROID_KEY_PASSWORD")

android {
    namespace = "com.sofull.site"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "com.sofull.site"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode androidVersionCodeNumber
        versionName androidVersionNameValue
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        if (hasCiSigning) {
            ci {
                def keystorePath = System.getenv("ANDROID_KEYSTORE_PATH")
                if (keystorePath == null || keystorePath.isEmpty()) {
                    keystorePath = "ci-keystore.jks"
                }
                storeFile file(keystorePath)
                storePassword System.getenv("ANDROID_KEYSTORE_PASSWORD")
                keyAlias System.getenv("ANDROID_KEY_ALIAS")
                keyPassword System.getenv("ANDROID_KEY_PASSWORD")
            }
        }
    }
    buildTypes {
        debug {
            if (hasCiSigning) {
                signingConfig signingConfigs.ci
            }
        }
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (hasCiSigning) {
                signingConfig signingConfigs.ci
            }
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation project(':capacitor-cordova-android-plugins')
}

play {
    defaultToAppBundles.set(true)
    track.set(googlePlayTrackValue)
    releaseStatus.set(googlePlayReleaseStatus)

    if (googlePlayCredentialsPath) {
        serviceAccountCredentials.set(file(googlePlayCredentialsPath))
    }
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
